apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-queue
  namespace: fleet-management
spec:
  replicas: 2
  selector:
    matchLabels:
      app: telemetry-queue
  template:
    metadata:
      labels:
        app: telemetry-queue
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 90
      serviceAccountName: fleet-backend
      containers:
        - name: queue
          image: REGION-docker.pkg.dev/PROJECT_ID/fleet-management/backend-app:replace-at-deploy
          imagePullPolicy: IfNotPresent
          command:
            [
              "php",
              "artisan",
              "queue:work",
              "--queue=telemetry-processing,telemetry-alerts",
              "--tries=5",
              "--backoff=5",
              "--timeout=60",
              "--sleep=1",
              "--max-jobs=500",
              "--max-time=3600"
            ]
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            runAsUser: 33
            runAsGroup: 33
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 768Mi
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.19.0
          args:
            - "--private-ip"
            - "--port=5432"
            - "$(CLOUD_SQL_INSTANCE_CONNECTION_NAME)"
          env:
            - name: CLOUD_SQL_INSTANCE_CONNECTION_NAME
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: CLOUD_SQL_INSTANCE_CONNECTION_NAME
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
