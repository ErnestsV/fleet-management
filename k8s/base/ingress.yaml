apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fleet-management
  namespace: fleet-management
  annotations:
    kubernetes.io/ingress.class: gce
spec:
  rules:
    - http:
        paths:
          - path: /api/v1/telemetry
            pathType: Prefix
            backend:
              service:
                name: telemetry-ingest
                port:
                  number: 80
          - path: /app
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 80
          - path: /broadcasting
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 80
          - path: /sanctum
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 80
          - path: /up
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
